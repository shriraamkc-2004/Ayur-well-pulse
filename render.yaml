services:
  - type: web
    name: ayurwell-server
    runtime: node
    region: singapore
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "1h"
      - key: JWT_REFRESH_EXPIRATION
        value: "30d"
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ENCRYPTION_SALT
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://ayur-well-pulse.vercel.app"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: AUTH_RATE_LIMIT_MAX
        value: "20"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: FRONTEND_URL
        value: "https://ayur-well-pulse.vercel.app"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
